apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - postsync.yml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: postsync-files
    files:
      - files/postsync.sh
      - files/webhook-template.json

  - name: postsync-env
    literals:
      - HOOK=PostSync
      - APP_NAME=<overwrite>
      - ENVIRONMENT=<overwrite>
      - WEBHOOK_URL=<overwrite>



